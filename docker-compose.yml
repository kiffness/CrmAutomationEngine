services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  crm-server:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal   # can reach db
      - proxy      # reachable by Caddy as "crm-server:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Database=crm;Username=crm;Password=${DB_PASSWORD}
      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: CrmAutomationEngine
      Jwt__Audience: CrmAutomationEngine
      SendGrid__ApiKey: ${SendGrid__ApiKey}
      SendGrid__FromEmail: ${SendGrid__FromEmail}
      Seed__TenantName: ${Seed__TenantName:-}
      Seed__AdminEmail: ${Seed__AdminEmail:-}
      Seed__AdminPassword: ${Seed__AdminPassword:-}
      Seed__HubSpotToken: ${Seed__HubSpotToken:-}
      Seed__HubSpotClientSecret: ${Seed__HubSpotClientSecret:-}

volumes:
  pgdata:

networks:
  internal:
  proxy:
    external: true  # shared network Caddy is already on — must exist before compose up
